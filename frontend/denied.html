  <style>
    :root {
      --brand-red:#E71C22; --brand-red-ink:#B91319;
      --bg-cream:#FBF7F4; --surface:#FFFFFF;
      --fg-1:#1E1715; --fg-2:#3B2E2B; --fg-3:#765B56;
      --border:#EAE3E1; --border-strong:#D4C7C4;
      --r-lg:20px; --r-md:12px;
      --shadow-md:rgba(99,99,99,.2) 0 2px 8px 0;
      --font-sans:"Supreme","Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg-cream); color:var(--fg-1); min-height:100vh; display:flex;
      align-items:center; justify-content:center; padding:24px;
      font-family:var(--font-sans); -webkit-font-smoothing:antialiased; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg);
      padding:48px 40px; max-width:460px; width:100%; box-shadow:var(--shadow-md); text-align:center; }
    .logo { margin-bottom:24px; }
    .logo img { height:34px; width:auto; display:inline-block; }
    .icon { width:56px; height:56px; margin:0 auto 22px; }
    h1 { font-size:20px; font-weight:800; letter-spacing:-.01em; margin-bottom:12px; }
    p { font-size:15px; line-height:1.55; color:var(--fg-3); margin-bottom:14px; }
    p strong { color:var(--fg-2); }
    p a { color:var(--brand-red); }
    .actions { margin-top:26px; display:flex; flex-direction:column; gap:12px; }
    .btn { display:inline-flex; align-items:center; justify-content:center;
      padding:12px 20px; border-radius:var(--r-md); font-size:15px; font-weight:700; text-decoration:none; }
    .btn-ghost { background:transparent; color:var(--fg-1); border:1px solid var(--border-strong); }
    .btn-ghost:hover { border-color:var(--fg-3); }
  </style>
